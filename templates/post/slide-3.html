<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../theme.css">
  <style>
    .slide { background: var(--muted); }
    .cta-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 80px 64px;
      text-align: center;
      box-shadow: 0 12px 48px rgba(0,0,0,0.08);
    }
    .cta-action {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 24px 56px;
      border-radius: var(--radius-pill);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 36px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content">
      <div class="cta-card flex-col gap-32 items-center">
        <h2 class="heading heading-lg">Want more?</h2>
        <p class="body body-lg">Your call to action goes here.</p>
        <span class="cta-action">Follow @yourhandle</span>
      </div>
    </div>
  </div>
</body>
</html>
